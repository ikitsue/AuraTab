<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraTab - New Tab</title>
    <link rel="stylesheet" href="newtab-style.css">
</head>
<body>
    <!-- Fond d'écran dynamique -->
    <div id="wallpaper-container" class="wallpaper-container">
        <div id="wallpaper-display" class="wallpaper-display"></div>
        <div class="wallpaper-overlay"></div>
    </div>

    <!-- Conteneur principal -->
    <div class="main-container">
        <!-- En-tête avec horloge et température -->
        <header class="header">
            <div class="clock-widget">
                <div id="time" class="time">00:00</div>
                <div id="date" class="date">Monday, May 18</div>
            </div>
            <div class="header-right">
                <div class="weather-widget">
                    <span id="temp" class="temp">--°C</span>
                </div>
                <button id="settings-btn-header" class="settings-btn-header" title="Settings">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.64l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.22-.07.49.12.64l2.03 1.58c-.05.3-.07.62-.07.94 0 .32.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.64l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.49-.12-.64l-2.11-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"></path>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Section de recherche Google -->
        <section class="search-section">
            <div class="search-container">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.35-4.35"></path>
                </svg>
                <input 
                    type="text" 
                    id="search-input" 
                    class="search-input" 
                    placeholder="Search..."
                    aria-label="Search"
                >
                <div id="search-suggestions" class="search-suggestions hidden"></div>
            </div>
        </section>

        <!-- Raccourcis rapides -->
        <section class="shortcuts-section">
            <div class="shortcuts-grid" id="shortcuts-grid">
                <a href="https://gmail.com" class="shortcut-card" title="Gmail">
                    <div class="shortcut-icon">📧</div>
                    <span>Gmail</span>
                </a>
                <a href="https://youtube.com" class="shortcut-card" title="YouTube">
                    <div class="shortcut-icon">📺</div>
                    <span>YouTube</span>
                </a>
                <a href="https://github.com" class="shortcut-card" title="GitHub">
                    <div class="shortcut-icon">💻</div>
                    <span>GitHub</span>
                </a>
                <a href="https://reddit.com" class="shortcut-card" title="Reddit">
                    <div class="shortcut-icon">🔗</div>
                    <span>Reddit</span>
                </a>
                <button id="add-shortcut-btn" class="shortcut-card add-shortcut" title="Add shortcut">
                    <div class="shortcut-icon">➕</div>
                    <span>Add</span>
                </button>
            </div>
        </section>

        <!-- Panneau de contrôle flottant -->
        <div class="floating-control-panel">
            <button id="toggle-settings-btn" class="control-btn settings-btn" title="Settings">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <circle cx="12" cy="12" r="1.5"></circle>
                    <circle cx="19" cy="12" r="1.5"></circle>
                    <circle cx="5" cy="12" r="1.5"></circle>
                </svg>
            </button>
            <button id="sound-toggle-btn" class="control-btn sound-btn" title="Toggle Sound">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.26 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"></path>
                </svg>
            </button>
        </div>

        <!-- Modal des paramètres -->
        <div id="settings-modal" class="settings-modal hidden">
            <div class="settings-panel">
                <div class="settings-header">
                    <h2>AuraTab Settings</h2>
                    <button id="close-settings-btn" class="close-btn">&times;</button>
                </div>

                <div class="settings-content">
                    <!-- Section Fond d'écran -->
                    <div class="settings-section">
                        <h3>🎨 Wallpaper</h3>
                        
                        <div class="wallpaper-preview">
                            <div id="preview-wallpaper" class="preview-box"></div>
                        </div>

                        <div class="wallpaper-actions">
                            <button id="upload-wallpaper-btn" class="action-btn primary-btn">
                                📤 Upload Wallpaper
                            </button>
                            <button id="remove-wallpaper-btn" class="action-btn danger-btn">
                                🗑️ Remove Wallpaper
                            </button>
                            <input 
                                type="file" 
                                id="wallpaper-input" 
                                accept="image/png,image/jpeg,image/gif"
                                style="display: none;"
                            >
                        </div>

                        <div class="wallpaper-info">
                            <p id="wallpaper-info-text">No custom wallpaper</p>
                        </div>
                    </div>

                    <!-- Section Interface -->
                    <div class="settings-section">
                        <h3>⚙️ Interface</h3>
                        
                        <label class="option-toggle">
                            <input 
                                type="checkbox" 
                                id="show-shortcuts" 
                                class="checkbox"
                                checked
                            >
                            <span>Show shortcuts</span>
                        </label>

                        <label class="option-toggle">
                            <input 
                                type="checkbox" 
                                id="show-weather" 
                                class="checkbox"
                                checked
                            >
                            <span>Show weather</span>
                        </label>

                        <label class="option-toggle">
                            <input 
                                type="checkbox" 
                                id="show-time" 
                                class="checkbox"
                                checked
                            >
                            <span>Show clock</span>
                        </label>
                    </div>

                    <!-- Section Moteur de Recherche -->
                    <div class="settings-section">
                        <h3>🔍 Search Engine</h3>
                        
                        <label class="search-engine-label">
                            <span>Choose default engine:</span>
                            <select id="search-engine" class="search-engine-select">
                                <option value="google">🔵 Google</option>
                                <option value="brave">🦁 Brave Search</option>
                                <option value="duckduckgo">🦆 DuckDuckGo</option>
                                <option value="ecosia">🌱 Ecosia</option>
                                <option value="bing">💙 Bing</option>
                            </select>
                        </label>
                    </div>

                    <!-- Section Raccourcis -->
                    <div class="settings-section">
                        <h3>🔗 Custom Shortcuts</h3>
                        <div id="shortcuts-list" class="shortcuts-list"></div>
                        <button id="add-shortcut-settings-btn" class="action-btn primary-btn">
                            ➕ Add Shortcut
                        </button>
                    </div>
                </div>

                <div class="settings-footer">
                    <p class="version">AuraTab v1.0.0</p>
                    <button id="save-settings-btn" class="save-btn">💾 Save</button>
                </div>
            </div>
        </div>

        <!-- Modal Ajouter/Modifier Raccourci -->
        <div id="shortcut-modal" class="shortcut-modal hidden">
            <div class="shortcut-modal-content">
                <div class="modal-header">
                    <h2 id="shortcut-modal-title">Add Shortcut</h2>
                    <button id="close-shortcut-modal-btn" class="close-btn">&times;</button>
                </div>
                <div class="modal-body">
                    <label class="form-group">
                        <span>Website Name:</span>
                        <input type="text" id="shortcut-name" placeholder="ex: Gmail" maxlength="20">
                    </label>
                    <label class="form-group">
                        <span>URL:</span>
                        <input type="text" id="shortcut-url" placeholder="ex: https://gmail.com">
                    </label>
                    <label class="form-group">
                        <span>Emoji/Icon:</span>
                        <input type="text" id="shortcut-icon" placeholder="ex: 📧" maxlength="2">
                    </label>
                </div>
                <div class="modal-footer">
                    <button id="cancel-shortcut-btn" class="action-btn danger-btn">Cancel</button>
                    <button id="save-shortcut-btn" class="action-btn primary-btn">Save</button>
                </div>
            </div>
        </div>
    </div>

    <script src="newtab.js"></script>
</body>
</html>
