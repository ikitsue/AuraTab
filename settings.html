<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraTab - Settings</title>
    <link rel="stylesheet" href="newtab-style.css">
    <link rel="stylesheet" href="settings-style.css">
    <script src="i18n.js"></script>
</head>
<body>
    <!-- Dynamic wallpaper -->
    <div id="wallpaper-container" class="wallpaper-container">
        <div id="wallpaper-display" class="wallpaper-display"></div>
        <div class="wallpaper-overlay"></div>
    </div>

    <!-- Main settings container -->
    <div class="settings-page-container">
        <!-- Settings header -->
        <header class="settings-header-page">
            <div class="settings-title-section">
                <h1 data-i18n="aura_settings">⚙️ AuraTab Settings</h1>
                <p data-i18n="customize_experience" style="display: none;">Customize your experience</p>
            </div>
            <a href="newtab.html" class="back-btn" title="Back" data-i18n="back_button" style="display: none;">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M19 11H7.83l5.59-5.59L12 3l-9 9 9 9 1.41-1.41L7.83 13H19v-2z"></path>
                </svg>
                Back
            </a>
        </header>

        <!-- Settings content -->
        <main class="settings-content-page">
            <!-- Language Section -->
            <section class="settings-card">
                <div class="card-header">
                    <h2 data-i18n="language">🌐 Language</h2>
                </div>
                <div class="card-content">
                    <div class="control-group">
                        <label for="language-select" data-i18n="language_setting">Choose your language</label>
                        <select id="language-select" class="select-input">
                            <option value="en" data-i18n="english">English</option>
                            <option value="fr" data-i18n="francais">Français</option>
                            <option value="ru" data-i18n="russian">Русский</option>
                            <option value="zh" data-i18n="chinese">中文</option>
                            <option value="es" data-i18n="spanish">Español</option>
                        </select>
                    </div>
                </div>
            </section>

            <!-- Location Section -->
            <section class="settings-card">
                <div class="card-header">
                    <h2 data-i18n="location">📍 Location</h2>
                </div>
                <div class="card-content">
                    <div class="control-group">
                        <label for="country-select" data-i18n="select_country">Select your country</label>
                        <select id="country-select" class="select-input">
                            <option value="">Choose a country...</option>
                            <option value="us">United States</option>
                            <option value="gb">United Kingdom</option>
                            <option value="fr">France</option>
                            <option value="de">Germany</option>
                            <option value="it">Italy</option>
                            <option value="es">Spain</option>
                            <option value="ca">Canada</option>
                            <option value="au">Australia</option>
                            <option value="jp">Japan</option>
                            <option value="cn">China</option>
                            <option value="ru">Russia</option>
                            <option value="br">Brazil</option>
                            <option value="mx">Mexico</option>
                            <option value="in">India</option>
                            <option value="kr">South Korea</option>
                        </select>
                    </div>
                    <div class="control-group">
                        <label for="city-select" data-i18n="select_city">Select your city</label>
                        <select id="city-select" class="select-input">
                            <option value="">Choose a city...</option>
                        </select>
                    </div>
                </div>
            </section>

            <!-- About Section -->
            <section class="settings-card">
                <div class="card-header">
                    <h2 data-i18n="about">ℹ️ About</h2>
                </div>
                <div class="card-content">
                    <p class="about-text">
                        <strong data-i18n="version">AuraTab v1.0.0</strong><br>
                        <span data-i18n="about_text" style="display: none;">Customize your new tab with dynamic wallpapers and browser sound effects.</span>
                    </p>
                    <p class="credits-text" data-i18n="credits" style="display: none;">
                        Created with ❤️ by the AuraTab team
                    </p>
                </div>
            </section>
        </main>
    </div>

    <script src="settings.js"></script>
</body>
</html>
