<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraTab Settings</title>
    <link rel="stylesheet" href="popup-style.css">
    <script src="i18n.js"></script>
</head>
<body>
    <div class="popup-container">
        <!-- Header -->
        <div class="popup-header">
            <h1 class="popup-title" data-i18n="aura_title">🌟 AuraTab</h1>
            <div class="popup-subtitle" data-i18n="quick_config">Quick Configuration</div>
        </div>

        <!-- Main content -->
        <div class="popup-content">
            <!-- Actions Section -->
            <div class="popup-section">
                <button id="settings-btn" class="quick-btn">
                    <span class="btn-icon">⚙️</span>
                    <span data-i18n="settings_button_popup">Settings</span>
                    <span class="btn-arrow">→</span>
                </button>
            </div>

            <!-- Information Section -->
            <div class="popup-section">
                <div class="info-box">
                    <div class="info-item">
                        <span class="info-label" data-i18n="version_label">Version:</span>
                        <span class="info-value">1.0.0</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label" data-i18n="status_label">Status:</span>
                        <span class="info-value status-active" data-i18n="status_active">✅ Active</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="popup-footer">
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
